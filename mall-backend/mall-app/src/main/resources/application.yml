server:
  port: 8080

spring:
  application:
    name: mall-lite
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/mall_lite?useUnicode=true&characterEncoding=utf8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
    username: root
    password: 09ijklmn
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      timeout: 3s
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    virtual-host: /
    publisher-confirm-type: simple
    listener:
      simple:
        default-requeue-rejected: false
        retry:
          enabled: true
          max-attempts: 3
          initial-interval: 1s
          multiplier: 2
          max-interval: 5s

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    banner: false

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: method
  api-docs:
    path: /v3/api-docs

mall:
  sentinel:
    enabled: true
    project-name: mall-lite
    dashboard-server: localhost:8858
    api-port: 8719
    hot-product-detail:
      enabled: true
      flow-qps: 2
      slow-request-rt-ms: 500
      slow-request-ratio: 0.5
      min-request-amount: 5
      stat-interval-ms: 10000
      time-window-seconds: 10
  product:
    cache:
      detail-key-prefix: "mall:product:detail:"
      hot-detail-key-prefix: "mall:product:hot:detail:"
      hot-detail-lock-key-prefix: "mall:product:hot:detail:lock:"
      detail-ttl-minutes: 30
      detail-random-ttl-minutes: 5
      detail-null-ttl-minutes: 5
      hot-detail-ttl-minutes: 30
      hot-detail-random-ttl-minutes: 5
      hot-detail-null-ttl-minutes: 5
      hot-detail-lock-wait-seconds: 1
      hot-detail-lock-lease-seconds: 10
      hot-detail-lock-retry-times: 3
      hot-detail-lock-retry-interval-ms: 50
    hot:
      hour-key-prefix: "mall:product:hot:hour:"
      homepage-key: "mall:product:hot:homepage"
      temporary-key: "mall:product:hot:homepage:tmp"
      bucket-ttl-hours: 48
      homepage-ttl-minutes: 15
      view-dedup-ttl-minutes: 5
      aggregation-fixed-delay-ms: 1800000
      aggregation-limit: 50
      window-hours: 24
    hot-rabbit:
      event-exchange: mall.product.hot.event.exchange
      event-queue: mall.product.hot.event.queue
      event-routing-key: mall.product.hot.event.routing-key
      failed-exchange: mall.product.hot.failed.exchange
      failed-queue: mall.product.hot.failed.queue
      failed-routing-key: mall.product.hot.failed.routing-key
      confirm-timeout-seconds: 3
  order:
    rabbit:
      delay-exchange: mall.order.delay.exchange
      delay-queue: mall.order.delay.queue
      delay-routing-key: mall.order.delay.routing-key
      cancel-exchange: mall.order.cancel.exchange
      cancel-queue: mall.order.cancel.queue
      cancel-routing-key: mall.order.cancel.routing-key
      failed-exchange: mall.order.failed.exchange
      failed-queue: mall.order.failed.queue
      failed-routing-key: mall.order.failed.routing-key
      timeout-minutes: 30
    scheduling:
      compensation-fixed-delay-ms: 60000
      alert-fixed-delay-ms: 60000
      timeout-minutes: 30
      batch-size: 100
  coupon:
    rabbit:
      coupon-reward-exchange: mall.coupon-reward.exchange
      coupon-reward-queue: mall.coupon-reward.queue
      coupon-reward-routing-key: mall.coupon-reward.routing-key
      failed-exchange: mall.coupon.failed.exchange
      failed-queue: mall.coupon.failed.queue
      failed-routing-key: mall.coupon.failed.routing-key
      timeout-minutes: 30
  cart:
    rabbit:
      change-exchange: mall.cart.change.exchange
      change-queue: mall.cart.change.queue
      change-routing-key: mall.cart.change.routing-key
      failed-exchange: mall.cart.failed.exchange
      failed-queue: mall.cart.failed.queue
      failed-routing-key: mall.cart.failed.routing-key
      confirm-timeout-seconds: 3
